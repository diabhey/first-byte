<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Compass Coffee — Voice Agent Orb</title>
  <meta name="description" content="A local voice client that talks to your deployed Compass Coffee agent on LiveKit Cloud. Built for the Production Voice AI Agents with LiveKit course." />
  <meta name="theme-color" content="#f4efe5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #f4efe5;          /* warm cream paper */
      --ink:         #15131a;          /* deep ink */
      --ink-soft:    rgba(21, 19, 26, 0.68);
      --muted:       rgba(21, 19, 26, 0.50);
      --rule:        rgba(21, 19, 26, 0.14);
      --rule-2:      rgba(21, 19, 26, 0.22);
      --violet:      #6c31e3;          /* LiveKit/Obsidian primary */
      --violet-soft: #A88BFA;          /* lighter accent */
      --mono: 'IBM Plex Mono', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    body {
      font-family: var(--mono);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      font-feature-settings: "tnum" 1, "ss03" 1, "calt" 0;
    }

    canvas#orb {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      display: block;
      pointer-events: none;
      touch-action: manipulation;
    }

    .shell {
      position: fixed; inset: 0;
      z-index: 2;
      display: grid;
      grid-template-rows: auto 1fr auto;
      pointer-events: none;
    }

    header, footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 2rem;
      padding: clamp(1.05rem, 2.4vw, 1.55rem) clamp(1.25rem, 4vw, 2.25rem);
      font-size: 0.66rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    header { border-bottom: 1px solid var(--rule); }
    footer { border-top:    1px solid var(--rule); }

    .mark {
      display: inline-flex; align-items: baseline; gap: 0.62em;
      color: var(--ink);
      font-weight: 500;
    }
    .mark-dot {
      width: 0.38em; height: 0.38em;
      align-self: center;
      border-radius: 999px;
      background: var(--violet);
      box-shadow: 0 0 0 1.5px rgba(108, 49, 227, 0.14),
                  0 0 16px rgba(108, 49, 227, 0.40);
      animation: dot-pulse 3.2s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { transform: scale(0.82); opacity: 0.62; }
      50%      { transform: scale(1.06); opacity: 1; }
    }

    .tagline { color: var(--muted); }
    .byline  { color: var(--ink-soft); text-decoration: none; pointer-events: auto; }
    .byline:hover { color: var(--ink); }

    main { position: relative; }

    .orb-tap {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(46vmin, 380px);
      aspect-ratio: 1;
      border: 0; background: transparent;
      cursor: pointer;
      pointer-events: auto;
      outline: none;
      border-radius: 50%;
    }
    .orb-tap:focus-visible {
      box-shadow: 0 0 0 1px var(--ink),
                  0 0 0 6px rgba(21, 19, 26, 0.08),
                  0 0 90px rgba(108, 49, 227, 0.28);
    }
    .orb-tap:not(:focus-visible) { box-shadow: none; }

    .state-anchor {
      position: absolute;
      top: calc(50% + min(28vmin, 240px));
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center;
      gap: clamp(0.7rem, 2vw, 1.2rem);
      font-size: 0.68rem;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--ink-soft);
      white-space: nowrap;
      pointer-events: none;
      transition: color 400ms ease;
    }
    .anchor-rule {
      width: clamp(1.6rem, 6vw, 2.8rem);
      height: 1px;
      background: var(--rule-2);
      transition: background 400ms ease;
    }
    .state-anchor[data-state="connecting"],
    .state-anchor[data-state="listening"],
    .state-anchor[data-state="thinking"],
    .state-anchor[data-state="speaking"] { color: var(--ink); }
    .state-anchor[data-state="error"]    { color: var(--muted); }
    .state-anchor[data-state="connecting"] .anchor-rule,
    .state-anchor[data-state="listening"]  .anchor-rule,
    .state-anchor[data-state="speaking"]   .anchor-rule { background: var(--violet-soft); }
    .state-anchor[data-state="thinking"]   .anchor-rule { background: var(--violet); }

    @media (max-width: 540px) {
      header, footer { font-size: 0.6rem; padding: 0.9rem 1.05rem; gap: 0.8rem; letter-spacing: 0.24em; }
      .state-anchor   { font-size: 0.62rem; letter-spacing: 0.3em; gap: 0.7rem; }
      .tagline        { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .mark-dot { animation: none; }
      .state-anchor, .anchor-rule { transition: none; }
    }
  </style>
</head>
<body>
  <canvas id="orb" aria-hidden="true"></canvas>

  <div class="shell">
    <header>
      <div class="mark">
        <span class="mark-dot" aria-hidden="true"></span>
        <span>Compass Coffee</span>
      </div>
    </header>

    <main>
      <button class="orb-tap" id="orbButton" aria-label="Tap to talk with the Compass Coffee agent"></button>
      <div class="state-anchor" id="stateAnchor" data-state="idle">
        <span class="anchor-rule" aria-hidden="true"></span>
        <span class="state-label" id="topStatus">tap to talk</span>
        <span class="anchor-rule" aria-hidden="true"></span>
      </div>
    </main>

    <footer>
      <div class="tagline">single-origin</div>
      <a class="byline" href="https://github.com/diabhey/first-byte" rel="me">first-byte course</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
  <script src="config.js"></script>
  <script>
  (() => {
    // ── Config check ────────────────────────────────────────────────────────
    const cfg = (typeof CONFIG !== 'undefined' && CONFIG.LIVEKIT) ? CONFIG.LIVEKIT : null;

    const orbButton   = document.getElementById('orbButton');
    const topStatus   = document.getElementById('topStatus');
    const stateAnchor = document.getElementById('stateAnchor');
    const canvas      = document.getElementById('orb');

    if (!cfg || !cfg.URL || !cfg.TOKEN || cfg.TOKEN === 'YOUR_LIVEKIT_TOKEN') {
      topStatus.textContent = 'configure config.js';
      stateAnchor.setAttribute('data-state', 'error');
      orbButton.disabled = true;
      console.warn('[orb] config.js missing or unfilled. See README.md');
    }

    // ── State machine ──────────────────────────────────────────────────────
    const palette = {
      idle:       { label: 'tap to talk'  },
      connecting: { label: 'connecting'   },
      listening:  { label: 'tap to stop'  },
      thinking:   { label: 'tap to stop'  },
      speaking:   { label: 'tap to stop'  },
      error:      { label: 'tap to retry' },
    };

    let state = 'idle';
    function setState(next) {
      state = next;
      const p = palette[state] || palette.idle;
      topStatus.textContent = p.label;
      stateAnchor.setAttribute('data-state', state);
      applyStateLook(state);
    }

    // ── Three.js orb ───────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setClearColor(0x000000, 0);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    camera.position.set(0, 0, 4.2);

    const target = {
      core: new THREE.Color('#8a72c0'),
      rim:  new THREE.Color('#c4adff'),
    };
    let displayedVol = 0;
    let targetSize = 1.0;

    const stateLook = {
      idle:       { core: '#8a72c0', rim: '#c4adff', size: 1.00 },
      connecting: { core: '#9d80e3', rim: '#c4adff', size: 1.04 },
      listening:  { core: '#a78bfa', rim: '#e0d4ff', size: 1.10 },
      thinking:   { core: '#b09ee0', rim: '#A88BFA', size: 1.06 },
      speaking:   { core: '#c4adff', rim: '#e0d4ff', size: 1.14 },
      error:      { core: '#9b8a9b', rim: '#cfc5cf', size: 0.94 },
    };

    function applyStateLook(stateName) {
      const look = stateLook[stateName] || stateLook.idle;
      target.core.set(look.core);
      target.rim.set(look.rim);
      targetSize = look.size;
    }

    const uniforms = {
      uTime:      { value: 0 },
      uVolume:    { value: 0 },
      uColorCore: { value: target.core.clone() },
      uColorRim:  { value: target.rim.clone() },
    };

    // Emissive sphere with a directional light + fresnel rim + specular bead.
    // Lambert is biased to a bright range (0.7..1.05) so the dim side never
    // reads as a dark planet — the orb stays luminous on cream.
    const sphereMat = new THREE.ShaderMaterial({
      uniforms,
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vViewPos;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          vNormal  = normalize(normalMatrix * normal);
          vViewPos = -mv.xyz;
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3  uColorCore;
        uniform vec3  uColorRim;
        uniform float uVolume;
        varying vec3 vNormal;
        varying vec3 vViewPos;
        void main() {
          vec3  view   = normalize(vViewPos);
          float facing = max(dot(vNormal, view), 0.0);
          float fres   = pow(1.0 - facing, 1.6);

          vec3  lightDir = normalize(vec3(-0.45, 0.65, 0.65));
          float lambert  = max(dot(vNormal, lightDir), 0.0);
          float shade    = 0.7 + lambert * 0.35;
          float spec     = pow(max(dot(reflect(-lightDir, vNormal), view), 0.0), 36.0);

          vec3 col = uColorCore * shade;
          col = mix(col, uColorRim, fres * 0.7);
          col += uColorRim * pow(fres, 5.0) * (0.6 + uVolume * 0.6);
          col += vec3(1.0, 0.96, 0.92) * spec * 0.55;
          col *= 1.10;

          gl_FragColor = vec4(col, 1.0);
        }
      `,
    });

    const sphereGeo = new THREE.IcosahedronGeometry(0.45, 48);
    const sphere    = new THREE.Mesh(sphereGeo, sphereMat);
    scene.add(sphere);

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    // ── Web Audio analysers ────────────────────────────────────────────────
    let audioCtx = null, localAnalyser = null, agentAnalyser = null;
    function ensureAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function makeAnalyser(mediaStream) {
      const ac = ensureAudioCtx();
      const src = ac.createMediaStreamSource(mediaStream);
      const a = ac.createAnalyser();
      a.fftSize = 512;
      a.smoothingTimeConstant = 0.72;
      src.connect(a);
      return a;
    }
    const freqBuf = new Uint8Array(256);
    function readVolume(analyser) {
      if (!analyser) return 0;
      analyser.getByteFrequencyData(freqBuf);
      let sum = 0;
      for (let i = 0; i < freqBuf.length; i++) sum += freqBuf[i];
      const avg = sum / freqBuf.length / 255;
      return Math.min(1, Math.pow(avg * 1.85, 1.25));
    }

    // ── Render loop ─────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    function animate() {
      const t  = clock.getElapsedTime();
      const dt = Math.min(0.05, clock.getDelta());

      let rawVol = 0;
      if (state === 'speaking')       rawVol = readVolume(agentAnalyser);
      else if (state === 'listening') rawVol = readVolume(localAnalyser);
      else if (state === 'thinking')  rawVol = 0.08 + Math.sin(t * 2.1) * 0.02;
      else if (state === 'connecting')rawVol = 0.10 + Math.sin(t * 4.0) * 0.03;
      else                            rawVol = 0.04;
      displayedVol += (rawVol - displayedVol) * Math.min(1, dt * 12);

      uniforms.uColorCore.value.lerp(target.core, 0.05);
      uniforms.uColorRim.value.lerp(target.rim, 0.05);
      uniforms.uTime.value   = t;
      uniforms.uVolume.value = displayedVol;

      const breath = 1 + Math.sin(t * 0.9) * 0.012 + displayedVol * 0.05;
      sphere.scale.setScalar(targetSize * breath);
      sphere.rotation.y += dt * 0.10;
      sphere.rotation.x  = Math.sin(t * 0.22) * 0.10;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // ── LiveKit connection ─────────────────────────────────────────────────
    let room = null, stateTimer = null, userEndedSession = false;

    function queueThinkingFallback() {
      clearTimeout(stateTimer);
      if (state === 'listening') {
        stateTimer = setTimeout(() => {
          if (state === 'listening') setState('thinking');
        }, 2200);
      }
    }

    async function startConversation() {
      if (!cfg || !cfg.URL || !cfg.TOKEN || cfg.TOKEN === 'YOUR_LIVEKIT_TOKEN') return;
      if (['connecting', 'listening', 'thinking', 'speaking'].includes(state)) return;
      setState('connecting');

      try {
        ensureAudioCtx();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        const LK = window.LivekitClient;
        room = new LK.Room({
          adaptiveStream: true,
          dynacast: true,
          audioCaptureDefaults: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
        });

        room.on(LK.RoomEvent.TrackSubscribed, (track) => {
          if (track.kind === LK.Track.Kind.Audio) {
            const audioEl = track.attach();
            audioEl.autoplay = true;
            audioEl.playsInline = true;
            audioEl.style.display = 'none';
            document.body.appendChild(audioEl);
            try {
              const ms = new MediaStream([track.mediaStreamTrack]);
              agentAnalyser = makeAnalyser(ms);
            } catch (e) { console.warn('agent analyser failed', e); }
          }
        });

        room.on(LK.RoomEvent.ActiveSpeakersChanged, (speakers) => {
          const me = room.localParticipant && room.localParticipant.identity;
          const userTalking  = speakers.some((p) => p.identity === me);
          const agentTalking = speakers.some((p) => p.identity !== me);
          if (agentTalking)       setState('speaking');
          else if (userTalking) { setState('listening'); queueThinkingFallback(); }
          else if (state !== 'connecting') setState('thinking');
        });

        room.on(LK.RoomEvent.Disconnected, () => {
          clearTimeout(stateTimer);
          localAnalyser = null;
          agentAnalyser = null;
          if (userEndedSession) { userEndedSession = false; setState('idle'); }
          else { setState('error'); }
        });

        await room.connect(cfg.URL, cfg.TOKEN);
        await room.localParticipant.setMicrophoneEnabled(true);

        const mic = room.localParticipant.getTrackPublication(LK.Track.Source.Microphone);
        if (mic && mic.audioTrack) {
          const ms = new MediaStream([mic.audioTrack.mediaStreamTrack]);
          localAnalyser = makeAnalyser(ms);
        }
        setState('listening');
      } catch (err) {
        console.error(err);
        setState('error');
      }
    }

    async function endConversation() {
      if (!room) return;
      userEndedSession = true;
      try { await room.disconnect(); } catch (e) { console.warn('disconnect failed', e); }
      room = null;
    }

    function toggleConversation() {
      const live = ['connecting', 'listening', 'thinking', 'speaking'];
      if (live.includes(state)) endConversation();
      else startConversation();
    }

    orbButton.addEventListener('click', toggleConversation);
    setState('idle');
  })();
  </script>
</body>
</html>
